<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FAQ & Chat Application{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="accent-bg" aria-hidden="true"></div>
    <header class="site-header">
        <div class="header-inner container">
            <div class="brand">
                <a href="/">FAQ & Chat
                    <svg class="brand-mark" width="28" height="28" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
                        <rect x="2" y="3" width="20" height="14" rx="2" fill="var(--accent)"/>
                        <path d="M6 17c1.333-1 3-1 6 0 3-1 4.667-1 6 0v2H6v-2z" fill="#fff" opacity="0.95"/>
                    </svg>
                </a>
            </div>
            <nav class="main-nav" role="navigation" aria-label="Primary">
                <a class="nav-link" href="/">Interfaces</a>
                <a class="nav-link" href="/faq">FAQ</a>
                <a class="nav-link" href="/retrieval_chat">Retrieval</a>
                <a class="nav-link" href="/ai_chat">AI Chat</a>
            </nav>
        </div>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <footer>
        <p>&copy; 2026 FAQ & Chat Application.</p>
    </footer>
    
    {% block extra_js %}{% endblock %}
    <script src="/static/js/ui.js" defer></script>
</body>
</html>
